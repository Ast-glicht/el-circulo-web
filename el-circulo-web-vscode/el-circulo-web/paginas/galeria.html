<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Galería | El Círculo Gaming House</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="../logocortado.jpg">
  <link rel="stylesheet" href="../style/styles.css?v=6" />
</head>

<body>
  <div class="bg-grid"></div>

  <div class="scan-transition" id="scanTransition">
    <div class="scan-flash"></div>
    <div class="scan-line"></div>
  </div>

  <header class="site-header">
    <div class="container nav-bar">
      <a class="brand" href="inicio.html">
        <img src="../logo.jpg" alt="Logo El Círculo Gaming House" class="brand-logo">
        <span>
          <strong>EL CÍRCULO</strong>
          <small>Gaming House</small>
        </span>
      </a>

      <div class="menu-wrapper">
        <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <nav class="menu-panel" id="menuPanel">
          <a href="inicio.html">Inicio</a>
          <a href="servicios.html">Servicios</a>
          <a href="anuncios.html">Anuncios</a>
          <a href="horarios.html">Horarios</a>
          <a href="nosotros.html">Nosotros</a>
          <a href="galeria.html" class="active-page">Galería</a>
          <a href="contactanos.html">Contacto</a>
          <a href="faq.html">FAQ</a>
        </nav>
      </div>
    </div>
  </header>

  <main>
    <section class="section gallery-section" id="galeria">
      <div class="container">

        <div class="gallery-hero">
          <p class="eyebrow">Momentos legendarios</p>
          <h1>Galería Gaming</h1>
          <p>
            Explora nuestras zonas, eventos, partidas y experiencias dentro de El Círculo Gaming House.
          </p>
        </div>

        <div class="gallery-mosaic" id="galleryGrid"></div>

      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div id="spriteFloor" aria-hidden="true"></div>

    <div class="container footer-content">
      <p>© 2026 El Círculo Gaming House. Todos los Derechos Reservados.</p>

      <div class="footer-socials">
        <a href="https://www.facebook.com/p/El-Circulo-Gaming-House-100063761764940/" target="_blank" class="social-icon" aria-label="Facebook">
          <i class="fa-brands fa-facebook-f"></i>
        </a>

        <a href="https://www.instagram.com/elcirculogaminghouse/" target="_blank" class="social-icon" aria-label="Instagram">
          <i class="fa-brands fa-instagram"></i>
        </a>

        <a href="https://www.tiktok.com/@elcirculogaminghouse" target="_blank" class="social-icon" aria-label="TikTok">
          <i class="fa-brands fa-tiktok"></i>
        </a>
      </div>
    </div>
  </footer>

  <div class="modal gallery-modal" id="modal">
    <div class="modal-box gallery-modal-box">
      <button class="modal-close" id="modalClose">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="../script/site-data.js?v=6"></script>
  <script src="../script/galeria.js?v=6"></script>
  <script src="../script/sprite-catalog.js?v=6"></script>
  <script src="../script/easter-sprites.js?v=6"></script>
  <script src="../script/auth.js?v=6"></script>

  <script>
    const modal = document.getElementById("modal");
    const modalContent = document.getElementById("modalContent");
    const modalClose = document.getElementById("modalClose");

    function openModal(content) {
      if (!modal || !modalContent) return;
      modalContent.innerHTML = content;
      modal.classList.add("show");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      if (!modal || !modalContent) return;
      modal.classList.remove("show");
      document.body.style.overflow = "";
      modalContent.innerHTML = "";
    }

    if (modalClose) modalClose.addEventListener("click", closeModal);

    if (modal) {
      modal.addEventListener("click", function (e) {
        if (e.target === modal) closeModal();
      });
    }

    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closeModal();
    });

    const menuToggle = document.getElementById("menuToggle");
    const menuPanel = document.getElementById("menuPanel");

    if (menuToggle && menuPanel) {
      menuToggle.addEventListener("click", function (e) {
        e.stopPropagation();
        menuToggle.classList.toggle("open");
        menuPanel.classList.toggle("show");
      });

      menuPanel.addEventListener("click", function (e) {
        e.stopPropagation();
      });

      document.addEventListener("click", function () {
        menuToggle.classList.remove("open");
        menuPanel.classList.remove("show");
      });
    }

    const scanTransition = document.getElementById("scanTransition");

    document.querySelectorAll("a").forEach(link => {
      link.addEventListener("click", function (e) {
        const href = this.getAttribute("href");
        const target = this.getAttribute("target");

        if (
          !href ||
          href.startsWith("#") ||
          href.startsWith("http") ||
          href.startsWith("mailto:") ||
          href.startsWith("tel:") ||
          target === "_blank"
        ) return;

        e.preventDefault();

        if (scanTransition) {
          scanTransition.classList.add("active");
        }

        setTimeout(() => {
          window.location.href = href;
        }, 520);
      });
    });
  </script>
</body>
</html>
